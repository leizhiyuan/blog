baseURL = "http://blog.leaver.me/"
languageCode = "zh-CN"
title = "bystander's blog"
theme = "PaperMod"
summaryLength = 140
defaultContentLanguage = "zh-cn"
googleAnalytics = "G-EGT73FHC0P"

[outputFormats]
  [outputFormats.RSS]
    baseName = "rss"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "trac"
    noClasses = false
    guessSyntax = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  env = "production"
  description = "寻找窄门"
  author = "bystander"
  DateFormat = "2006-01-02"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  comments = true
  favicon = "images/favicon.ico"

  [params.giscus]
    repo = "leizhiyuan/blog"
    repoID = "MDEwOlJlcG9zaXRvcnkyOTE2NDY4NA=="
    category = "Announcements"
    categoryID = "DIC_kwDOAb0EjM4C6SbO"
    mapping = "pathname"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "top"
    theme = "preferred_color_scheme"
    lang = "zh-CN"

  [params.homeInfoParams]
    Title = "bystander's blog"
    Content = "寻找窄门"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/leizhiyuan"

  [[params.socialIcons]]
    name = "rss"
    url = "rss.xml"

[permalinks]
  post = "/:year/:month/:day/:title/"

[menu]
[[menu.main]]
  name = "主页"
  weight = 10
  identifier = "home"
  url = "/"
[[menu.main]]
  name = "归档"
  weight = 20
  identifier = "archives"
  url = "/archives/"
[[menu.main]]
  name = "标签"
  weight = 30
  identifier = "tags"
  url = "/tags/"
[[menu.main]]
  name = "目录"
  weight = 40
  identifier = "categories"
  url = "/categories/"
[[menu.main]]
  name = "搜索"
  weight = 45
  identifier = "search"
  url = "/search/"
[[menu.main]]
  name = "关于我"
  weight = 50
  identifier = "about"
  url = "/about/"
